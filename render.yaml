# Render Blueprint for the On Point Portal (Node.js / Express + React).
# Deploy by pointing Render at this repo ("New +" -> "Blueprint").
# Docs: https://render.com/docs/blueprint-spec
#
# Note: this is a Node app, not Python — there is no requirements.txt or
# gunicorn. Dependencies live in package.json and the app serves itself
# via `npm start` (node dist/index.cjs).

services:
  - type: web
    name: on-point-portal
    runtime: node
    plan: free
    # `--include=dev` keeps build tools (vite, esbuild, tsx, drizzle-kit)
    # available even if Render sets NODE_ENV=production during install.
    # `db:push` creates the PostgreSQL tables on deploy (Drizzle does not
    # auto-create them the way SQLite mode does).
    buildCommand: npm install --include=dev && npm run build && npm run db:push
    startCommand: npm start
    envVars:
      # Render injects the database connection string automatically.
      - key: DATABASE_URL
        fromDatabase:
          name: on-point-portal-db
          property: connectionString
      # Required in production — the app refuses to start without it.
      - key: SESSION_SECRET
        generateValue: true

databases:
  - name: on-point-portal-db
    plan: free
